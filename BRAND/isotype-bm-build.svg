<?xml version="1.0" encoding="UTF-8"?>
<!-- 
  BMBuildManage Isotipo - Emerald Cube Concept
  Cubo isométrico wireframe con letras B y M integradas
  Diseño: Monolinear, líneas de grosor constante
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Color verde esmeralda -->
    <style>
      .stroke { fill: none; stroke: #10B981; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .fill-primary { fill: #10B981; }
      .fill-dark { fill: #0F172A; }
    </style>
  </defs>
  
  <!-- Cubo isométrico base -->
  <!-- Cara frontal izquierda (B) -->
  <path class="stroke" d="M 20 30 L 20 80 L 50 95 L 50 45 Z" />
  
  <!-- Cara frontal derecha (M) -->
  <path class="stroke" d="M 50 95 L 50 45 L 80 30 L 80 80 Z" />
  
  <!-- Cara superior -->
  <path class="stroke" d="M 20 30 L 50 15 L 80 30 L 50 45 Z" />
  
  <!-- Letra B integrada en cara izquierda -->
  <!-- Trazo vertical de B -->
  <line class="stroke" x1="28" y1="38" x2="28" y2="72" />
  <!-- Curvas horizontales de B -->
  <path class="stroke" d="M 28 42 Q 38 42 42 48 Q 46 54 42 58 Q 38 62 28 62" />
  <path class="stroke" d="M 28 62 Q 40 62 44 70 Q 46 76 40 80 Q 32 84 28 80" />
  
  <!-- Letra M integrada en cara derecha -->
  <!-- Trazo vertical de M -->
  <line class="stroke" x1="72" y1="38" x2="72" y2="72" />
  <!-- Diagonales de M -->
  <line class="stroke" x1="72" y1="38" x2="58" y2="58" />
  <line class="stroke" x1="58" y1="58" x2="72" y2="72" />
</svg>