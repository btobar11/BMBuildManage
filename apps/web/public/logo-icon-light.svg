<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="secondaryGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fondo blanco con borde -->
  <rect width="128" height="128" rx="28" fill="#FFFFFF"/>
  <rect width="128" height="128" rx="28" fill="url(#primaryGrad)" opacity="0.05"/>
  
  <!-- Icono principal -->
  <g transform="translate(64, 64)" filter="url(#glow)">
    <path d="M-28 20 L-28 -8 Q-28 -20 -16 -20 L16 -20 Q28 -20 28 -8 L28 20 L28 35 L-28 35 Z" fill="url(#secondaryGrad)"/>
    
    <!-- Windows grid -->
    <rect x="-20" y="-10" width="8" height="10" rx="1" fill="#E0E7FF" opacity="0.9"/>
    <rect x="-6" y="-10" width="8" height="10" rx="1" fill="#E0E7FF" opacity="0.9"/>
    <rect x="8" y="-10" width="8" height="10" rx="1" fill="#E0E7FF" opacity="0.9"/>
    <rect x="-20" y="8" width="8" height="10" rx="1" fill="#E0E7FF" opacity="0.7"/>
    <rect x="-6" y="8" width="8" height="10" rx="1" fill="#E0E7FF" opacity="0.7"/>
    <rect x="8" y="8" width="8" height="10" rx="1" fill="#E0E7FF" opacity="0.7"/>
    
    <!-- Accent bar on top -->
    <path d="M-16 -28 L-16 -20 L16 -20 L16 -28 Q16 -32 12 -32 L-12 -32 Q-16 -32 -16 -28" fill="url(#accentGrad)"/>
    
    <!-- Roof detail -->
    <path d="M-8 -32 L0 -38 L8 -32" stroke="#F472B6" stroke-width="2" stroke-linecap="round" fill="none"/>
    
    <!-- Ground line -->
    <path d="M-35 35 L35 35" stroke="#E0E7FF" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>
  
  <!-- Small accent dot -->
  <circle cx="108" cy="20" r="6" fill="#F472B6"/>
</svg>