<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150" fill="none">
  <!-- Background -->
  <rect width="400" height="150" fill="#ffffff"/>
  
  <!-- Logo Mark Area: 120x120 -->
  <g transform="translate(60, 15)">
    
    <!-- MAIN STRUCTURE - Emerald Teal #047857 -->
    <!-- Left vertical pillar (B vertical bar) -->
    <rect x="0" y="0" width="18" height="100" fill="#047857"/>
    
    <!-- Top horizontal beam -->
    <rect x="0" y="0" width="100" height="18" fill="#047857"/>
    
    <!-- Right vertical pillar (M right vertical) -->
    <rect x="82" y="0" width="18" height="100" fill="#047857"/>
    
    <!-- Middle vertical (B/M connection) -->
    <rect x="32" y="0" width="18" height="100" fill="#047857"/>
    
    <!-- ACCENT LINES - Emerald Green #10b981 -->
    <!-- Upward arrow (growth symbol) at top right -->
    <path d="M50 0 L60 -25 L70 0 L60 -10 Z" fill="#10b981"/>
    
    <!-- Horizontal sync lines -->
    <rect x="18" y="22" width="46" height="6" fill="#10b981"/>
    <rect x="18" y="38" width="64" height="6" fill="#10b981"/>
    <rect x="18" y="54" width="64" height="6" fill="#10b981"/>
    <rect x="18" y="70" width="64" height="6" fill="#10b981"/>
    
    <!-- Vertical flow lines -->
    <rect x="50" y="22" width="6" height="52" fill="#10b981"/>
    
    <!-- GAUCHO HAT SUBTLE SILHOUETTE in negative space -->
    <!-- Hat in the middle negative area -->
    <rect x="32" y="35" width="18" height="8" fill="#ffffff"/>
    <rect x="28" y="43" width="26" height="4" fill="#ffffff"/>
    <rect x="36" y="25" width="10" height="12" fill="#ffffff"/>
    
  </g>
  
  <!-- WORDMARK -->
  <g transform="translate(200, 105)">
    <text x="0" y="0" text-anchor="middle" font-family="system-ui, -apple-system, Inter, sans-serif" font-size="18" font-weight="700" fill="#047857" letter-spacing="3">BM BUILD MANAGE</text>
  </g>
  
</svg>
