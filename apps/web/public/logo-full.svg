<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <linearGradient id="gradTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="gradLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="gradRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>
  
  <!-- Icono - Cubo isométrico moderno -->
  <g transform="translate(8, 8)">
    <!-- Cara superior -->
    <path d="M32 4 L56 18 L32 32 L8 18 Z" fill="url(#gradTop)" stroke="none"/>
    <path d="M32 4 L56 18 L32 32 L8 18 Z" stroke="#065F46" stroke-width="0.5" stroke-opacity="0.3"/>
    
    <!-- Cara izquierda -->
    <path d="M8 18 L32 32 L32 60 L8 46 Z" fill="url(#gradLeft)" stroke="none"/>
    <path d="M8 18 L32 32 L32 60 L8 46 Z" stroke="#065F46" stroke-width="0.5" stroke-opacity="0.3"/>
    
    <!-- Cara derecha -->
    <path d="M32 32 L56 18 L56 46 L32 60 Z" fill="url(#gradRight)" stroke="none"/>
    <path d="M32 32 L56 18 L56 46 L32 60 Z" stroke="#065F46" stroke-width="0.5" stroke-opacity="0.3"/>
    
    <!-- Líneas decorativas - Construcción -->
    <path d="M20 24 L20 40" stroke="#ECFDF5" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M44 24 L44 40" stroke="#ECFDF5" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M20 24 L32 18" stroke="#ECFDF5" stroke-width="1" stroke-linecap="round"/>
    <path d="M44 24 L32 18" stroke="#ECFDF5" stroke-width="1" stroke-linecap="round"/>
    <path d="M20 40 L32 46" stroke="#ECFDF5" stroke-width="1" stroke-linecap="round"/>
    <path d="M44 40 L32 46" stroke="#ECFDF5" stroke-width="1" stroke-linecap="round"/>
  </g>
  
  <!-- Texto principal -->
  <text x="78" y="38" font-family="system-ui, -apple-system, Inter, sans-serif" font-weight="700" font-size="28" fill="#0F172A" letter-spacing="-0.5">BM</text>
  <text x="78" y="56" font-family="system-ui, -apple-system, Inter, sans-serif" font-weight="600" font-size="11" fill="#64748B" letter-spacing="3">BUILD MANAGE</text>
</svg>