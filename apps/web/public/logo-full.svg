<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- BM Build Manage — Full Horizontal Logo (Light/Dark) -->
  <style>
    .bm-text { fill: #0F172A; }
    @media (prefers-color-scheme: dark) { .bm-text { fill: #F8FAFC; } }
  </style>
  <defs>
    <linearGradient id="hf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="hs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="hr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>

  <!-- Building isotipo -->
  <g transform="translate(12, 12)">
    <!-- Building -->
    <path d="M10 30 L46 30 L46 92 L10 92 Z" fill="url(#hf)"/>
    <path d="M46 30 L78 16 L78 78 L46 92 Z" fill="url(#hs)"/>
    <path d="M10 30 L42 16 L78 16 L46 30 Z" fill="url(#hr)"/>
    
    <!-- Windows -->
    <rect x="15" y="38" width="8" height="10" rx="1" fill="#A7F3D0" opacity="0.45"/>
    <rect x="27" y="38" width="8" height="10" rx="1" fill="#A7F3D0" opacity="0.45"/>
    <rect x="15" y="54" width="8" height="10" rx="1" fill="#A7F3D0" opacity="0.3"/>
    <rect x="27" y="54" width="8" height="10" rx="1" fill="#A7F3D0" opacity="0.3"/>
    <rect x="27" y="70" width="8" height="22" rx="1.5" fill="#6EE7B7" opacity="0.35"/>
    
    <!-- Side windows -->
    <path d="M50 38 L64 31 L64 39 L50 46 Z" fill="#A7F3D0" opacity="0.15"/>
    <path d="M50 54 L64 47 L64 55 L50 62 Z" fill="#A7F3D0" opacity="0.1"/>
    
    <!-- Crane -->
    <rect x="4" y="4" width="3" height="88" rx="1" fill="#047857" opacity="0.7"/>
    <rect x="4" y="4" width="50" height="3" rx="1" fill="#047857" opacity="0.6"/>
    <line x1="54" y1="7" x2="54" y2="15" stroke="#6EE7B7" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(120, 34)">
    <text x="0" y="34" font-family="system-ui, -apple-system, 'Inter', sans-serif" 
          font-size="36" font-weight="800" class="bm-text" letter-spacing="1">
      BM
    </text>
    <text x="0" y="54" font-family="system-ui, -apple-system, 'Inter', sans-serif" 
          font-size="13" font-weight="700" fill="#10B981" letter-spacing="4.5">
      BUILD MANAGE
    </text>
  </g>
</svg>