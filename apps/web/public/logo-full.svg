<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- BM Build Manage - Full Horizontal Logo -->
  
  <!-- Background -->
  <rect width="400" height="120" fill="#ffffff"/>
  
  <!-- Isotipo: 80x80 -->
  <g transform="translate(20, 20)">
    <!-- Outer hexagon -->
    <path d="M40 0 L80 20 L80 60 L40 80 L0 60 L0 20 Z" 
          stroke="#10B981" stroke-width="3" fill="none" stroke-linejoin="round"/>
    
    <!-- Center vertical -->
    <path d="M40 0 L40 80" stroke="#10B981" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Left face -->
    <path d="M0 20 L40 40 L40 60 L0 80 Z" 
          stroke="#10B981" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
    
    <!-- Right face -->
    <path d="M40 40 L80 20 L80 60 L40 80 Z" 
          stroke="#10B981" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
    
    <!-- Top face -->
    <path d="M0 20 L40 0 L80 20 L40 40 Z" 
          stroke="#10B981" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
    
    <!-- Depth accent lines -->
    <path d="M20 30 L40 40 L60 30" 
          stroke="#10B981" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M20 50 L40 60 L60 50" 
          stroke="#10B981" stroke-width="1" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Wordmark: Right side -->
  <g transform="translate(130, 35)">
    <!-- BM -->
    <text x="0" y="35" font-family="system-ui, -apple-system, sans-serif" 
          font-size="32" font-weight="800" fill="#0F172A" letter-spacing="2">
      BM
    </text>
    
    <!-- BUILD MANAGE -->
    <text x="0" y="55" font-family="system-ui, -apple-system, sans-serif" 
          font-size="14" font-weight="700" fill="#10B981" letter-spacing="4">
      BUILD MANAGE
    </text>
  </g>

</svg>