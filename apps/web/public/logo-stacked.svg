<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 140" fill="none">
  <!-- BM Build Manage — Stacked/Vertical Logo (Light/Dark) -->
  <style>
    .s-text { fill: #0F172A; }
    @media (prefers-color-scheme: dark) { .s-text { fill: #F8FAFC; } }
  </style>
  <defs>
    <linearGradient id="sf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="ss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="sr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>

  <!-- Centered building -->
  <g transform="translate(22, 8)">
    <path d="M12 30 L50 30 L50 90 L12 90 Z" fill="url(#sf)"/>
    <path d="M50 30 L82 16 L82 76 L50 90 Z" fill="url(#ss)"/>
    <path d="M12 30 L44 16 L82 16 L50 30 Z" fill="url(#sr)"/>
    
    <rect x="17" y="38" width="9" height="12" rx="1" fill="#A7F3D0" opacity="0.45"/>
    <rect x="30" y="38" width="9" height="12" rx="1" fill="#A7F3D0" opacity="0.45"/>
    <rect x="17" y="56" width="9" height="12" rx="1" fill="#A7F3D0" opacity="0.3"/>
    <rect x="30" y="58" width="9" height="32" rx="1.5" fill="#6EE7B7" opacity="0.35"/>
    
    <path d="M54 38 L68 32 L68 40 L54 46 Z" fill="#A7F3D0" opacity="0.15"/>
    
    <rect x="6" y="6" width="3" height="84" rx="1" fill="#047857" opacity="0.7"/>
    <rect x="6" y="6" width="52" height="3" rx="1" fill="#047857" opacity="0.6"/>
    <line x1="58" y1="9" x2="58" y2="16" stroke="#6EE7B7" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  </g>

  <!-- BM -->
  <text x="65" y="115" text-anchor="middle" font-family="system-ui, -apple-system, 'Inter', sans-serif" 
        font-size="22" font-weight="800" class="s-text">
    BM
  </text>
  
  <!-- BUILD MANAGE -->
  <text x="65" y="132" text-anchor="middle" font-family="system-ui, -apple-system, 'Inter', sans-serif" 
        font-size="9" font-weight="700" fill="#10B981" letter-spacing="3.5">
    BUILD MANAGE
  </text>
</svg>