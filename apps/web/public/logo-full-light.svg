<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none">
  <defs>
    <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#10B981" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>
  
  <!-- Logo para modo claro (fondo blanco) -->
  
  <!-- Isotipo Cubo Isométrico B/M -->
  <g transform="translate(15, 15)">
    <!-- Grid de fondo -->
    <rect width="70" height="70" fill="url(#grid)" opacity="0.5" rx="4"/>
    
    <!-- Cara superior (Y-Z) -->
    <path d="M35 5 L65 22.32 L35 39.64 L5 22.32 Z" stroke="#10B981" stroke-width="2.5" fill="none"/>
    
    <!-- Cara izquierda (X-Y) -->
    <path d="M5 22.32 L35 39.64 L35 74.64 L5 57.32 Z" stroke="#10B981" stroke-width="2.5" fill="none"/>
    
    <!-- Cara derecha (X-Z) -->
    <path d="M35 39.64 L65 22.32 L65 57.32 L35 74.64 Z" stroke="#10B981" stroke-width="2.5" fill="none"/>
    
    <!-- Línea central vertical -->
    <path d="M35 22.32 L35 74.64" stroke="#10B981" stroke-width="2"/>
    
    <!-- Líneas B -->
    <path d="M20 30.99 L20 48.32" stroke="#10B981" stroke-width="2"/>
    <path d="M20 30.99 L35 22.32" stroke="#10B981" stroke-width="1.5"/>
    <path d="M20 48.32 L35 57.32" stroke="#10B981" stroke-width="1.5"/>
    
    <!-- Líneas M -->
    <path d="M50 30.99 L50 48.32" stroke="#10B981" stroke-width="2"/>
    <path d="M50 30.99 L35 22.32" stroke="#10B981" stroke-width="1.5"/>
    <path d="M50 48.32 L35 57.32" stroke="#10B981" stroke-width="1.5"/>
  </g>
  
  <!-- Texto BM (grande y legible) -->
  <text x="110" y="58" font-family="system-ui, -apple-system, Inter, sans-serif" font-weight="700" font-size="52" fill="#0f172a" letter-spacing="-1">BM</text>
  
  <!-- Texto BUILD MANAGE (más legible) -->
  <text x="112" y="78" font-family="system-ui, -apple-system, Inter, sans-serif" font-weight="500" font-size="13" fill="#64748b" letter-spacing="2.5">BUILD MANAGE</text>
</svg>