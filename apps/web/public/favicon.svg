<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background: transparent for favicon -->
  <rect width="32" height="32" fill="none"/>
  
  <!-- Emerald Cube Isotipo Favicon -->
  <g transform="translate(16, 16)">
    <!-- Isometric wireframe cube (16x16 centered) -->
    <!-- Outer hexagon -->
    <path d="M0 -10 L10 0 L10 10 L0 20 L-10 10 L-10 0 Z" 
          stroke="#10B981" stroke-width="2" fill="none" stroke-linejoin="round"/>
    
    <!-- Center vertical line -->
    <path d="M0 -10 L0 20" stroke="#10B981" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Left face -->
    <path d="M-10 0 L0 5 L0 15 L-10 10 Z" 
          stroke="#10B981" stroke-width="2" fill="none" stroke-linejoin="round"/>
    
    <!-- Right face -->
    <path d="M0 5 L10 0 L10 10 L0 15 Z" 
          stroke="#10B981" stroke-width="2" fill="none" stroke-linejoin="round"/>
    
    <!-- Top face -->
    <path d="M-10 0 L0 -10 L10 0 L0 5 Z" 
          stroke="#10B981" stroke-width="2" fill="none" stroke-linejoin="round"/>
  </g>
</svg>