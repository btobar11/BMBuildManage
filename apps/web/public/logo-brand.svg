<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- BM Build Manage - Brand Logo -->
  <!-- Emerald Cube Isotipo with B and M integration -->
  
  <!-- Background -->
  <rect width="200" height="200" fill="#ffffff"/>
  
  <!-- Isotipo: Isometric Cube - 120x120 centered -->
  <g transform="translate(40, 30)">
    <!-- Outer hexagon perimeter -->
    <path d="M60 0 L120 30 L120 90 L60 120 L0 90 L0 30 Z" 
          stroke="#10B981" stroke-width="4" fill="none" stroke-linejoin="round"/>
    
    <!-- Center vertical line (isometric axis) -->
    <path d="M60 0 L60 120" stroke="#10B981" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Left face (B suggestion) -->
    <path d="M0 30 L60 60 L60 90 L0 120 L0 30 Z" 
          stroke="#10B981" stroke-width="3" fill="none" stroke-linejoin="round"/>
    
    <!-- Right face (M suggestion) -->
    <path d="M60 60 L120 30 L120 90 L60 120 L60 60 Z" 
          stroke="#10B981" stroke-width="3" fill="none" stroke-linejoin="round"/>
    
    <!-- Top face -->
    <path d="M0 30 L60 0 L120 30 L60 60 L0 30 Z" 
          stroke="#10B981" stroke-width="3" fill="none" stroke-linejoin="round"/>
    
    <!-- Accent: Inner geometry lines for depth -->
    <path d="M30 45 L60 60 L90 45" 
          stroke="#10B981" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M30 75 L60 90 L90 75" 
          stroke="#10B981" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Wordmark -->
  <text x="100" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
        font-size="14" font-weight="700" fill="#0F172A" letter-spacing="3">
    BM BUILD MANAGE
  </text>
  
</svg>